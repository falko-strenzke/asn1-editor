name: Build Release Artifacts

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  LINUX_TARGET: x86_64-unknown-linux-gnu
  WINDOWS_TARGET: x86_64-pc-windows-msvc
  # The `openssl` crate is used for the post-quantum algorithms (ML-DSA /
  # SLH-DSA), which need OpenSSL 3.5+, and HSS/LMS which needs 3.6+enable-lms. Runner system OpenSSL is older (and the
  # `openssl-sys` vendored build only bundles the 3.0 LTS), so a static 3.5 is
  # built from source and linked in (enable-lms adds HSS/LMS verification) — this also makes the artifacts
  # self-contained (no external libssl at runtime).
  OPENSSL_VERSION: '3.6.0'

jobs:
  appimage:
    name: AppImage (x86-64)
    runs-on: ubuntu-22.04

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ env.LINUX_TARGET }}

      - name: Cache static OpenSSL
        id: cache-openssl
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/openssl
          key: openssl-${{ env.OPENSSL_VERSION }}-linux-x86_64-static

      - name: Build static OpenSSL 3.6 (ML-DSA / SLH-DSA / LMS)
        if: steps.cache-openssl.outputs.cache-hit != 'true'
        run: |
          prefix="$RUNNER_TEMP/openssl"
          src="$RUNNER_TEMP/openssl-src"
          mkdir -p "$src"
          curl --fail --location --retry 3 \
            "https://github.com/openssl/openssl/releases/download/openssl-${OPENSSL_VERSION}/openssl-${OPENSSL_VERSION}.tar.gz" \
            | tar -xz -C "$src" --strip-components=1
          cd "$src"
          ./Configure --prefix="$prefix" --libdir=lib enable-lms no-shared no-docs linux-x86_64
          make -j"$(nproc)"
          make install_sw
          make install_ssldirs   # openssl.cnf, needed by the `openssl req` CLI tests

      - name: Use static OpenSSL 3.6
        run: |
          echo "OPENSSL_DIR=$RUNNER_TEMP/openssl" >> "$GITHUB_ENV"
          echo "OPENSSL_STATIC=1" >> "$GITHUB_ENV"
          echo "$RUNNER_TEMP/openssl/bin" >> "$GITHUB_PATH"

      - name: Build and test
        run: |
          openssl version   # the freshly built 3.6, used by the openssl-CLI tests
          cargo test --locked --target "$LINUX_TARGET"
          cargo build --locked --release --target "$LINUX_TARGET"

      - name: Assemble AppDir
        run: |
          APPDIR="$RUNNER_TEMP/asn1-editor.AppDir"
          install -Dm755 "target/$LINUX_TARGET/release/asn1-editor" "$APPDIR/usr/bin/asn1-editor"
          install -Dm755 packaging/appimage/AppRun "$APPDIR/AppRun"
          install -Dm644 packaging/appimage/asn1-editor.desktop "$APPDIR/asn1-editor.desktop"
          install -Dm644 packaging/appimage/asn1-editor.svg "$APPDIR/asn1-editor.svg"
          ln -s asn1-editor.svg "$APPDIR/.DirIcon"
          mkdir -p "$APPDIR/usr/share/asn1-editor/specs"
          cp -a specs/asn1 "$APPDIR/usr/share/asn1-editor/specs/"

      - name: Build AppImage
        id: package
        env:
          APPIMAGETOOL_URL: https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          RUNTIME_URL: https://github.com/AppImage/type2-runtime/releases/download/continuous/runtime-x86_64
        run: |
          APPIMAGETOOL="$RUNNER_TEMP/appimagetool-x86_64.AppImage"
          RUNTIME="$RUNNER_TEMP/runtime-x86_64"
          curl --fail --location --retry 3 --output "$APPIMAGETOOL" "$APPIMAGETOOL_URL"
          curl --fail --location --retry 3 --output "$RUNTIME" "$RUNTIME_URL"
          chmod +x "$APPIMAGETOOL"

          VERSION="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')"
          OUTPUT="asn1-editor-${VERSION}-x86_64.AppImage"
          ARCH=x86_64 APPIMAGE_EXTRACT_AND_RUN=1 \
            "$APPIMAGETOOL" --runtime-file "$RUNTIME" \
            "$RUNNER_TEMP/asn1-editor.AppDir" "$OUTPUT"
          echo "path=$OUTPUT" >> "$GITHUB_OUTPUT"

      - name: Smoke-test AppImage
        env:
          APPIMAGE_EXTRACT_AND_RUN: '1'
        run: './${{ steps.package.outputs.path }} --dump testdata/cert_rsa.der > /dev/null'

      - name: Upload AppImage
        uses: actions/upload-artifact@v6
        with:
          name: asn1-editor-linux-x86_64
          path: ${{ steps.package.outputs.path }}
          if-no-files-found: error
          compression-level: 0

  windows:
    name: Windows portable app (x86-64)
    runs-on: windows-2022
    env:
      # aws-lc-sys requires NASM on Windows x86-64. Use the crate's
      # checked-in prebuilt objects when the runner does not provide it.
      AWS_LC_SYS_PREBUILT_NASM: '1'

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ env.WINDOWS_TARGET }}

      - name: Set up MSVC developer environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Set up Python (Botan configure.py)
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Provide python3 and GNU make for the vendored Botan build
        shell: pwsh
        run: |
          # The XMSS backend links Botan, compiled from source by the `botan`
          # crate's `vendored` feature. botan-src's build script invokes
          # `python3` and GNU `make` unconditionally (even under MSVC), but
          # Windows CPython ships only `python.exe` and the runner has no GNU
          # make. Create a `python3` shim next to python.exe (both its dir and
          # Chocolatey's bin are already on PATH) and install make. cl.exe
          # comes from the MSVC step above; Botan's Makefile drives it.
          $python = (Get-Command python).Source
          Copy-Item $python (Join-Path (Split-Path $python) "python3.exe") -Force
          choco install make --no-progress --yes

      - name: Cache static OpenSSL
        id: cache-openssl
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}\openssl
          key: openssl-${{ env.OPENSSL_VERSION }}-windows-x86_64-static

      - name: Build static OpenSSL 3.6 (ML-DSA / SLH-DSA / LMS)
        if: steps.cache-openssl.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $version = $env:OPENSSL_VERSION
          $prefix = Join-Path $env:RUNNER_TEMP "openssl"
          $src = Join-Path $env:RUNNER_TEMP "openssl-src"
          New-Item -ItemType Directory -Force -Path $src | Out-Null
          curl.exe --fail --location --retry 3 -o "$env:RUNNER_TEMP\openssl.tar.gz" `
            "https://github.com/openssl/openssl/releases/download/openssl-$version/openssl-$version.tar.gz"
          tar -xzf "$env:RUNNER_TEMP\openssl.tar.gz" -C $src --strip-components=1
          Push-Location $src
          # no-asm avoids a NASM dependency; no-shared links OpenSSL statically
          # into our binary so the portable app carries no libssl DLLs.
          perl Configure VC-WIN64A enable-lms no-shared no-asm no-docs "--prefix=$prefix" "--openssldir=$prefix"
          nmake
          nmake install_sw
          nmake install_ssldirs   # openssl.cnf, needed by any `openssl` CLI use
          Pop-Location

      - name: Use static OpenSSL 3.6
        shell: pwsh
        run: |
          $prefix = Join-Path $env:RUNNER_TEMP "openssl"
          "OPENSSL_DIR=$prefix" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "OPENSSL_STATIC=1" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "$prefix\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build and test
        run: |
          cargo test --locked --target $env:WINDOWS_TARGET
          cargo build --locked --release --target $env:WINDOWS_TARGET

      - name: Package portable application
        id: package
        shell: pwsh
        run: |
          $metadata = cargo metadata --no-deps --format-version 1 | ConvertFrom-Json
          $version = $metadata.packages[0].version
          $packageDir = Join-Path $env:RUNNER_TEMP "asn1-editor-windows-x86_64"
          $specDir = Join-Path $packageDir "specs/asn1"
          $output = Join-Path $env:GITHUB_WORKSPACE "asn1-editor-$version-windows-x86_64.zip"

          New-Item -ItemType Directory -Force -Path $specDir | Out-Null
          Copy-Item "target/$env:WINDOWS_TARGET/release/asn1-editor.exe" $packageDir
          Copy-Item "specs/asn1/*" $specDir -Recurse

          $testFile = (Resolve-Path "testdata/cert_rsa.der").Path
          Push-Location $packageDir
          try {
            & ./asn1-editor.exe --dump $testFile | Out-Null
            if ($LASTEXITCODE -ne 0) {
              throw "Windows executable smoke test failed with exit code $LASTEXITCODE"
            }
          } finally {
            Pop-Location
          }

          Compress-Archive -Path "$packageDir/*" -DestinationPath $output
          "path=$output" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Upload Windows application
        uses: actions/upload-artifact@v6
        with:
          name: asn1-editor-windows-x86_64
          path: ${{ steps.package.outputs.path }}
          if-no-files-found: error
          compression-level: 0

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [appimage, windows]
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Download AppImage artifact
        uses: actions/download-artifact@v7
        with:
          name: asn1-editor-linux-x86_64
          path: dist

      - name: Download Windows artifact
        uses: actions/download-artifact@v7
        with:
          name: asn1-editor-windows-x86_64
          path: dist

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            dist/*.AppImage \
            dist/*.zip \
            --verify-tag \
            --generate-notes
